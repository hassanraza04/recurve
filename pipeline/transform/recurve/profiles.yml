# dbt connection profiles. No secrets live here — everything sensitive comes
# from the environment. `dev` is the local DuckDB warehouse; `prod` is BigQuery
# for the live deploy.
recurve:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('RECURVE_WAREHOUSE_PATH', 'dev.duckdb') }}"
      threads: 4

    prod:
      type: bigquery
      method: service-account
      project: "{{ env_var('RECURVE_BQ_PROJECT', '') }}"
      dataset: "{{ env_var('RECURVE_BQ_DATASET', 'recurve') }}"
      keyfile: "{{ env_var('RECURVE_BQ_KEYFILE', '') }}"
      location: "{{ env_var('RECURVE_BQ_LOCATION', 'US') }}"
      threads: 4
